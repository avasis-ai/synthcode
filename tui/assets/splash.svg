<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#0d0d1a"/>
  <rect width="960" height="540" fill="url(#glow1)"/>
  <!-- Terminal title bar -->
  <rect x="0" y="0" width="960" height="36" fill="#111128" opacity="0.9"/>
  <circle cx="24" cy="18" r="7" fill="#FF5F57"/>
  <circle cx="46" cy="18" r="7" fill="#FFBD2E"/>
  <circle cx="68" cy="18" r="7" fill="#28C840"/>
  <text x="480" y="24" text-anchor="middle" fill="#555" font-family="monospace" font-size="13">synthcode — bash</text>
  <!-- ASCII Art Logo -->
  <g font-family="'Courier New', Courier, monospace" font-size="11.5" fill="#7c5cfc" filter="url(#textGlow)">
    <text x="42" y="80" xml:space="preserve">$$$$$$$\                       $$\     $$\        $$$$$$\                  $$\          </text>
    <text x="42" y="96" xml:space="preserve">$$  __$$\                      $$ |    $$ |      $$  __$$\                 $$ |         </text>
    <text x="42" y="112" xml:space="preserve">$$ /  \__|$$\   $$\ $$$$$$$\ $$$$$$\   $$$$$$$\  $$ /  \__| $$$$$$\   $$$$$$$ | $$$$$$\ </text>
    <text x="42" y="128" xml:space="preserve">\$$$$$$\  $$ |  $$ |$$  __$$\\_$$  _|  $$  __$$\ $$ |      $$  __$$\ $$  __$$ |$$  __$$\</text>
    <text x="42" y="144" xml:space="preserve"> \____$$\ $$ |  $$ |$$ |  $$ | $$ |    $$ |  $$ |$$ |      $$ /  $$ |$$ /  $$ |$$$$$$$$ |</text>
    <text x="42" y="160" xml:space="preserve">$$\   $$ |$$ |  $$ |$$ |  $$ | $$ |$$\ $$ |  $$ |$$ |  $$\ $$ |  $$ |$$ |  $$ |$$   ____|</text>
    <text x="42" y="176" xml:space="preserve">\$$$$$$  |\$$$$$$$ |$$ |  $$ | \$$$$  |$$ |  $$ |\$$$$$$  |\$$$$$$  |\$$$$$$$ |\$$$$$$$\ </text>
    <text x="42" y="192" xml:space="preserve"> \______/  \____$$ |\__|  \__|  \____/ \__|  \__| \______/  \______/  \_______| \_______|</text>
    <text x="42" y="208" xml:space="preserve">          $$\   $$ |                                                                    </text>
    <text x="42" y="224" xml:space="preserve">          \$$$$$$  |                                                                    </text>
    <text x="42" y="240" xml:space="preserve">           \______/                                                                     </text>
  </g>
  <!-- Tagline -->
  <text x="480" y="310" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="22" fill="#9b7dff" filter="url(#softGlow)" letter-spacing="3">
    Neural Intuition × Symbolic Precision
  </text>
  <!-- Decorative line -->
  <line x1="280" y1="340" x2="680" y2="340" stroke="#7c5cfc" stroke-width="1" opacity="0.3"/>
  <circle cx="280" cy="340" r="2" fill="#7c5cfc" opacity="0.5"/>
  <circle cx="680" cy="340" r="2" fill="#7c5cfc" opacity="0.5"/>
  <!-- Version / status info -->
  <text x="480" y="380" text-anchor="middle" font-family="monospace" font-size="14" fill="#555555">v0.1.0 • OpenTUI • Rust</text>
  <!-- Subtle circuit pattern -->
  <g stroke="#7c5cfc" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="440" x2="960" y2="440"/>
    <line x1="0" y1="460" x2="960" y2="460"/>
    <line x1="0" y1="480" x2="960" y2="480"/>
    <line x1="0" y1="500" x2="960" y2="500"/>
    <line x1="120" y1="440" x2="120" y2="540"/>
    <line x1="240" y1="440" x2="240" y2="540"/>
    <line x1="360" y1="440" x2="360" y2="540"/>
    <line x1="480" y1="440" x2="480" y2="540"/>
    <line x1="600" y1="440" x2="600" y2="540"/>
    <line x1="720" y1="440" x2="720" y2="540"/>
    <line x1="840" y1="440" x2="840" y2="540"/>
  </g>
  <!-- Blinking cursor -->
  <rect x="42" y="460" width="9" height="18" fill="#7c5cfc" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
