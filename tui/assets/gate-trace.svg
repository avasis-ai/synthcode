  <!-- Separator -->
  <line x1="20" y1="400" x2="940" y2="400" stroke="#333" stroke-width="0.5"/>
  <!-- Summary stats -->
  <g font-family="monospace" font-size="12">
    <text x="30" y="425" fill="#555555">Summary:</text>
    <text x="120" y="425" fill="#1D9E75">6 PASS</text>
    <text x="200" y="425" fill="#EF9F27">2 FAIL-RETRY</text>
    <text x="320" y="425" fill="#4A9FD8">2 VERIFIED</text>
    <text x="440" y="425" fill="#555555">│ Avg latency: 3.7ms │ P99: 7.8ms</text>
  </g>
  <!-- Progress bar -->
  <text x="30" y="455" font-family="monospace" font-size="12" fill="#555555">Fast path rate:</text>
  <rect x="160" y="444" width="300" height="14" rx="3" fill="#1a1a2e"/>
  <rect x="160" y="444" width="292" height="14" rx="3" fill="#1D9E75" fill-opacity="0.4"/>
  <text x="475" y="455" font-family="monospace" font-size="12" fill="#1D9E75">97.3%</text>
  <!-- Bottom bar -->
  <rect x="0" y="540" width="960" height="40" fill="#111128" opacity="0.7"/>
  <g font-family="monospace" font-size="12" fill="#555555">
    <text x="30" y="565">F1 Help</text>
    <text x="130" y="565">F2 Chat</text>
    <text x="230" y="565">F3 Gates</text>
    <text x="340" y="565" fill="#7c5cfc">F4 Trace</text>
    <text x="450" y="565">F5 World</text>
    <text x="830" y="565">q Quit</text>
  </g>
